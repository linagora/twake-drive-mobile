name: Security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy - filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-blocking: surfaces CRITICAL/HIGH in the logs without gating PRs,
    # matching the ci.yml checks. Findings are tracked in docs/ci-cd.md; remove
    # this line to make the scan blocking once the flagged CVEs are resolved.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Trivy (fs, vuln)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
